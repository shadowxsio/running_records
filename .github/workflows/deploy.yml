name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_run:
    workflows: ["Fetch Latest Runs"]
    types:
      - completed
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Translate CV to Bilingual JSON
        run: |
          python3 scripts/translate_cv.py
      - name: Generate PDF Resumes (French and English)
        run: |
          python3 -m http.server 8000 &
          SERVER_PID=$!
          sleep 3
          google-chrome --headless --no-sandbox --disable-gpu --no-pdf-header-footer --print-to-pdf=cv/cv_fr.pdf "http://localhost:8000/cv/index.html?lang=fr"
          google-chrome --headless --no-sandbox --disable-gpu --no-pdf-header-footer --print-to-pdf=cv/cv_en.pdf "http://localhost:8000/cv/index.html?lang=en"
          kill $SERVER_PID
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
