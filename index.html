<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickaël Gauvrit - Espace Personnel</title>
    
    <!-- Support pour thèmes clair/sombre -->
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Portail personnel de Mickaël Gauvrit - Cloud Engineer GCP & Coureur de sentiers">
    
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Portal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="portal-container">
        <!-- Main glass card -->
        <main class="portal-card glass-panel">
            
            <header class="profile-header">
                <div class="avatar-container">
                    <img src="images/profile.jpg" alt="Mickaël Gauvrit" class="portal-avatar">
                </div>
                <h1 class="portal-title">Mickaël Gauvrit</h1>
                <p class="portal-tagline">Cloud Engineer GCP &bull; DevOps &bull; SRE</p>
                <p class="portal-location"><i class="fa-solid fa-location-dot"></i> Montréal, Canada</p>
            </header>
            
            <!-- Elegant dashboard buttons -->
            <section class="portal-links">
                <a href="cv/" class="portal-btn cv-btn">
                    <div class="btn-icon-wrapper">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                    <div class="btn-text-wrapper">
                        <span class="btn-title">Mon CV Professionnel</span>
                        <span class="btn-desc">GCP, DevOps, SRE &bull; Bilingue FR / EN</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="runs/" class="portal-btn runs-btn">
                    <div class="btn-icon-wrapper">
                        <i class="fa-solid fa-person-running"></i>
                    </div>
                    <div class="btn-text-wrapper">
                        <span class="btn-title">Mes Courses & Records</span>
                        <span class="btn-desc">Suivi trail, statistiques & synchronisation Strava</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </section>
            
            <!-- Social networks section -->
            <footer class="portal-footer">
                <div class="social-links">
                    <a href="https://linkedin.com/in/micka%C3%ABl-gauvrit" target="_blank" rel="noopener noreferrer" class="social-btn linkedin" title="LinkedIn">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/shadowxsio" target="_blank" rel="noopener noreferrer" class="social-btn github" title="GitHub">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="https://www.strava.com/athletes/mickael_gauvrit" target="_blank" rel="noopener noreferrer" class="social-btn strava" title="Strava">
                        <i class="fa-brands fa-strava"></i>
                    </a>
                    <a href="https://www.instagram.com/shadow.xsio/" target="_blank" rel="noopener noreferrer" class="social-btn instagram" title="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="https://youtube.com/@shadowxsio?si=rd7ky_QG4FFqR8vO" target="_blank" rel="noopener noreferrer" class="social-btn youtube" title="YouTube">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
            </footer>
            
        </main>
    </div>
</body>
</html>
